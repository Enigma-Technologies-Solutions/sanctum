name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same branch when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast checks (Linux only, ~5 min) ───────────────────────────────────────
  # Runs first. The build matrix only starts after this passes, preventing
  # wasted platform minutes on code that doesn't compile or has lint errors.
  check:
    name: Lint & test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      # ── Frontend ────────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v6
        with:
          version: "10"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend build (TypeScript + Vite)
        run: pnpm build

      # ── Rust ────────────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux WebKit + GTK deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # ── Full Tauri build matrix ────────────────────────────────────────────────
  # Verifies the app compiles and bundles correctly on all target platforms.
  # Runs in parallel across platforms after `check` passes.
  build:
    name: Build (${{ matrix.name }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (arm64) — GitHub Actions M-series runner
          - name: macOS aarch64
            os: macos-14
            rust-target: aarch64-apple-darwin
            tauri-args: ''

          # macOS Intel (x86_64) — older GitHub Actions Intel runner
          - name: macOS x86_64
            os: macos-13
            rust-target: x86_64-apple-darwin
            tauri-args: ''

          # Windows x86_64
          - name: Windows x86_64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            tauri-args: ''

          # Linux x86_64
          - name: Linux x86_64
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            tauri-args: ''

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: "10"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.rust-target }}

      - name: Install Linux WebKit + GTK deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # Build the full Tauri app (frontend + Rust backend + bundle).
      # No signing secrets are injected in CI — the build produces unsigned
      # artifacts. Signed release builds happen in release.yml on tag push.
      - name: pnpm tauri build
        run: pnpm tauri build ${{ matrix.tauri-args }}
        env:
          # Suppress macOS notarization in CI (no signing certs present)
          CI: true
