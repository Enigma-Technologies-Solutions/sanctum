name: Release

# Triggered by pushing a semver tag: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Release (${{ matrix.name }})
    permissions:
      contents: write   # required to create the GitHub Release and upload artifacts

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS universal binary (arm64 + x86_64 in one .dmg) ─────────────
          # Requires both Rust targets. tauri-action handles the lipo step.
          - name: macOS universal
            os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin

          # ── Windows x86_64 — produces .msi and .exe installers ──────────────
          - name: Windows x86_64
            os: windows-latest
            rust-targets: ''
            tauri-args: ''

          # ── Linux x86_64 — produces .deb and .AppImage ──────────────────────
          - name: Linux x86_64
            os: ubuntu-22.04
            rust-targets: ''
            tauri-args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux WebKit + GTK deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # ── tauri-action — builds, (optionally) signs, and uploads artifacts ─────
      #
      # SIGNING SECRETS — how to obtain each:
      #
      # ── macOS ────────────────────────────────────────────────────────────────
      #
      # APPLE_CERTIFICATE
      #   Base64-encoded Developer ID Application certificate (.p12).
      #   1. Apple Developer portal → Certificates → "Developer ID Application"
      #   2. Download the .p12 (set a password during export)
      #   3. base64 < cert.p12 | pbcopy  → paste as the secret value
      #
      # APPLE_CERTIFICATE_PASSWORD
      #   The password you set when exporting the .p12 above.
      #
      # APPLE_SIGNING_IDENTITY
      #   The Common Name of the certificate, e.g.:
      #   "Developer ID Application: Enigma Technologies Solutions (TEAMID)"
      #   Find it via: security find-identity -v -p codesigning
      #
      # APPLE_ID
      #   Your Apple ID email address used to log into developer.apple.com
      #
      # APPLE_TEAM_ID
      #   10-character alphanumeric string shown in the Apple Developer portal
      #   under Membership Details, e.g. "AB12CD34EF"
      #
      # APPLE_PASSWORD
      #   An app-specific password, NOT your Apple ID password.
      #   Generate at: https://appleid.apple.com → Security → App-Specific Passwords
      #   This is used by notarytool to submit the .dmg for notarization.
      #
      # ── Windows ──────────────────────────────────────────────────────────────
      #
      # WINDOWS_CERTIFICATE
      #   Base64-encoded PFX/P12 code-signing certificate.
      #   Option A — DigiCert / Sectigo EV cert (~$400/yr):
      #     Export from the certificate store: certmgr → your cert → Export → PFX
      #     base64 < cert.pfx → paste as the secret value
      #   Option B — Azure Trusted Signing (~$10/mo, recommended):
      #     Use tauri-plugin-azure-signing instead; WINDOWS_CERTIFICATE is not
      #     needed for Azure Trusted Signing — replace with:
      #       AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET,
      #       AZURE_ENDPOINT, AZURE_CODE_SIGNING_ACCOUNT_NAME, AZURE_CERTIFICATE_PROFILE_NAME
      #
      # WINDOWS_CERTIFICATE_PASSWORD
      #   Password protecting the PFX file above.
      #   Not required for Azure Trusted Signing.
      #
      # ── Linux ────────────────────────────────────────────────────────────────
      #   No code signing required for Linux distribution.
      #   AppImage and .deb packages are unsigned; consider GPG-signing the
      #   release assets separately for distributions that verify package hashes.
      #
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # macOS signing + notarization (leave empty until certs are enrolled)
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}

          # Windows signing (leave empty until cert is enrolled)
          WINDOWS_CERTIFICATE:          ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

        with:
          tagName:       ${{ github.ref_name }}
          releaseName:   "Sanctum ${{ github.ref_name }}"
          releaseBody:   |
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
            for what's new in this release.

            **Verify downloads** — SHA-256 checksums are attached to this release.
            macOS: open the .dmg normally; Gatekeeper will clear the notarized build.
            Windows: if SmartScreen blocks the installer, click "More info → Run anyway"
            until the signing cert has accrued enough reputation (or use an EV cert).
          releaseDraft:  true    # review before publishing; flip to false to auto-publish
          prerelease:    false
          args:          ${{ matrix.tauri-args }}
